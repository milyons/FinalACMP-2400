name: Django Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build the Docker image using your Dockerfile
      - name: Build Docker Image
        run: docker build -t my-django-app .

      # 3. Run the container in the background
      # We map port 8000 so we can talk to it
      - name: Run Container
        run: |
          docker run -d -p 8000:8000 --name django-test my-django-app
          # Give it a few seconds to start up
          sleep 10

      # 4. Use CURL to see if the index page responds
      - name: Test Web Response
        run: |
          curl --silent --fail http://localhost:8000 | grep "hello world"
