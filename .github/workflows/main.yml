name: Django Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-django-app .

      - name: Run Container
        run: |
          docker run -d -p 8000:8000 --name django-test -e SECRET_KEY="final-project-key" my-django-app
          sleep 10
          docker logs django-test 

- name: Test Web Response
        run: |
          # This will print the first 10 lines of the page even if it fails
          curl http://localhost:8000 || echo "CURL FAILED"
          # Then do the actual check
          curl --silent --fail http://localhost:8000 | grep -i "hello world"
